services:
  server:
    build:
      context: ./server
    container_name: smart-leads-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/smart-leads-dashboard
      JWT_SECRET: replace_with_a_strong_secret_at_least_32_chars
      JWT_EXPIRES_IN: 7d
      CLIENT_URL: http://localhost:5173
    ports:
      - "5000:5000"
    depends_on:
      - mongo

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: http://localhost:5000/api
    container_name: smart-leads-client
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - server

  mongo:
    image: mongo:7
    container_name: smart-leads-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
